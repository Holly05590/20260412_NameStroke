<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>姓名學筆劃鑑定</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <!--  網頁快捷 App 開始-->
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
  <!--  網頁快捷 App 結束 -->
  <link rel="stylesheet" href="./all.css">
</head>
<body>

<div class="deco-top"></div>

<header>
  <div class="header-ornament">❧ 傳統命理 · 姓名筆劃 ❧</div>
  <h1>姓名學筆劃鑑定</h1>
  <p class="subtitle">三才五格 · 依康熙字典繁體筆劃計算</p>
  <div class="header-rule"><span>✦</span></div>
</header>

<main>

  <!-- 輸入區 -->
  <div class="card">
    <div class="section-title">輸入姓名</div>
    <div class="input-row">
      <div class="input-group">
        <label>姓 氏</label>
        <input type="text" id="c1" placeholder="姓" autocomplete="off" inputmode="text">
      </div>
      <div class="input-group">
        <label>名 一</label>
        <input type="text" id="c2" placeholder="名" autocomplete="off" inputmode="text">
      </div>
      <div class="input-group">
        <label>名 二<small>選填</small></label>
        <input type="text" id="c3" placeholder="名" autocomplete="off" inputmode="text">
      </div>
    </div>
    <button class="btn-clear" id="btn-clear">清　空</button>
  </div>

  <!-- 結果區 -->
  <div class="card" id="result-section">
    <div class="result-grid">
      <!-- Row 1 -->
      <div class="char-card" id="card1">
        <div class="card-role">姓 氏</div>
        <div class="char-display" id="d1">—</div>
        <div class="divider-line"></div>
        <div class="stroke-count" id="s1">—</div>
        <div class="stroke-unit">劃</div>
      </div>
      <div class="wuge-sq">
        <div class="wuge-name">父母宮</div>
        <div class="wuge-num" id="w-tian">—</div>
        <div class="wuge-formula">姓 ＋ 1</div>
      </div>
      <div class="wuxing-sq" id="wx-tian"></div>

      <!-- Row 2 -->
      <div class="char-card" id="card2">
        <div class="card-role">名 一</div>
        <div class="char-display" id="d2">—</div>
        <div class="divider-line"></div>
        <div class="stroke-count" id="s2">—</div>
        <div class="stroke-unit">劃</div>
      </div>
      <div class="wuge-sq">
        <div class="wuge-name">疾惡宮</div>
        <div class="wuge-num" id="w-ren">—</div>
        <div class="wuge-formula">姓 ＋ 名一</div>
      </div>
      <div class="wuxing-sq" id="wx-ren"></div>

      <!-- Row 3 -->
      <div class="char-card" id="card3">
        <div class="card-role">名 二</div>
        <div class="char-display" id="d3">—</div>
        <div class="divider-line"></div>
        <div class="stroke-count" id="s3">—</div>
        <div class="stroke-unit">劃</div>
      </div>
      <div class="wuge-sq">
        <div class="wuge-name">奴僕宮</div>
        <div class="wuge-num" id="w-di">—</div>
        <div class="wuge-formula">名一 ＋ 名二</div>
      </div>
      <div class="wuxing-sq" id="wx-di"></div>

      <!-- Row 4 -->
      <div class="wuge-sq">
        <div class="wuge-name">遷移宮</div>
        <div class="wuge-num" id="w-wai">—</div>
        <div class="wuge-formula">名二 ＋ 1</div>
      </div>
      <div class="wuge-sq">
        <div class="wuge-name">命 宮</div>
        <div class="wuge-num" id="w-zong">—</div>
        <div class="wuge-formula">姓＋名一＋名二</div>
      </div>
      <div></div>
    </div>
  </div>

</main>

<div class="deco-bottom"></div>
<footer>
  本工具依康熙字典繁體筆劃計算，偏旁依姓名學傳統規則補正<br>
  僅供參考，各門派筆劃計算規則略有差異
</footer>

<!-- cnchar-all：含完整繁簡字庫 -->
<script src="https://fastly.jsdelivr.net/npm/cnchar-all/cnchar.all.min.js"></script>
<script src="./all.js"></script>
</body>
</html>
